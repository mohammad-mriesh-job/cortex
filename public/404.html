<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cortex</title>
    <!--
      GitHub Pages has no SPA fallback: a direct hit to a client-side route
      (e.g. /cortex/java/topic/...) is served this 404 page. We encode the
      requested path into a query string and redirect to the app root; the
      snippet in index.html decodes it back before React Router boots.
      Single-page-apps-for-github-pages (rafgraph), MIT.
    -->
    <script type="text/javascript">
      // Number of path segments to preserve as the app base (/cortex/ => 1).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
