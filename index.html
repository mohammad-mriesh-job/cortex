<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cortex — a complete, deeply-researched tech-interview prep platform covering Java, DSA, OOP, concurrency, design patterns, system design, and databases, with diagrams, code, and interview questions."
    />
    <meta name="theme-color" content="#0e1116" />
    <title>Cortex — Master the Tech Interview</title>
    <!--
      Restore the real path after the 404.html redirect (GitHub Pages SPA
      fallback). Must run before the app so React Router sees the right URL.
    -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
